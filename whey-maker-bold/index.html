<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Whey Maker — Nevels Nutrition</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&family=Caveat:wght@500;700&family=Bungee&display=swap" rel="stylesheet">

<style>
  :root {
    /* Bag-pulled palette */
    --ink: #0e0e10;
    --ink-2: #1a1a1d;
    --paper: #fbf5ea;       /* cream from the bag bottom */
    --paper-2: #f4e9d2;     /* warmer cream */
    --pink: #ff2d7a;
    --pink-2: #c4144d;
    --pink-soft: #ffd4e4;
    --blue: #00c6e0;
    --blue-2: #0099b2;
    --blue-deep: #1e4a8a;
    --sky-pale: #d8e8f5;
    --sky-mid: #9abdda;
    --sky-deep: #4a6f96;
    --yellow: #ffd400;
    --yellow-2: #ffb800;
    --muted: #6c6c6c;
    --line: #e5e0d2;
    --success: #1c7a4e;
  }

  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--paper); overflow-x: hidden; }
  body {
    font-family: 'Inter', -apple-system, 'Helvetica Neue', Arial, sans-serif;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
  }
  img { max-width: 100%; display: block; }

  .display {
    font-family: Impact, 'Haettenschweiler', 'Arial Narrow Bold', sans-serif;
    font-weight: 400;
    line-height: 0.92;
    letter-spacing: -0.005em;
    text-transform: uppercase;
  }
  .script {
    font-family: 'Caveat', cursive;
    font-weight: 700;
    line-height: 1.05;
    letter-spacing: 0.01em;
  }
  .mono {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* ── Marquee ticker ──────────────────────────────────────────── */
  .ticker {
    background: var(--ink);
    color: var(--paper);
    padding: 10px 0;
    overflow: hidden;
    border-bottom: 3px solid var(--pink);
  }
  .ticker .row {
    display: flex;
    gap: 32px;
    white-space: nowrap;
    animation: ticker 28s linear infinite;
    width: max-content;
    font-family: Impact, sans-serif;
    font-size: 18px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .ticker .row span { display: inline-flex; align-items: center; gap: 32px; }
  .ticker .row .pink { color: var(--pink); }
  .ticker .row .blue { color: var(--blue); }
  .ticker .row .yel { color: var(--yellow); }
  @keyframes ticker {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }

  /* ── Nav ──────────────────────────────────────────────────────── */
  .nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 32px;
    background: var(--paper);
    border-bottom: 1px solid var(--line);
    position: sticky; top: 0; z-index: 50;
  }
  @media (max-width: 760px) { .nav { padding: 14px 18px; } }
  .nav .logo {
    font-family: Impact, sans-serif;
    font-size: 24px;
    letter-spacing: 0.02em;
    color: var(--ink);
  }
  .nav .logo .star { color: var(--pink); padding: 0 2px; }
  .nav .links { display: flex; gap: 28px; }
  .nav .links a {
    font-size: 13px;
    color: var(--ink);
    text-decoration: none;
    font-weight: 600;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    font-family: Impact, sans-serif;
    transition: color .12s;
  }
  .nav .links a:hover { color: var(--pink); }
  .nav .right { display: flex; gap: 14px; align-items: center; }
  .cart-pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 9px 16px;
    background: var(--ink); color: var(--paper);
    border-radius: 999px;
    font-family: Impact, sans-serif;
    font-size: 13px; letter-spacing: 0.04em; text-transform: uppercase;
    cursor: pointer;
    transition: background .15s;
  }
  .cart-pill:hover { background: var(--pink); }
  @media (max-width: 900px) { .nav .links { display: none; } }

  /* ── Button ──────────────────────────────────────────────────── */
  .btn {
    display: inline-flex; align-items: center; justify-content: center;
    gap: 10px;
    padding: 18px 28px;
    background: var(--pink); color: #fff;
    border: 3px solid var(--ink);
    border-radius: 999px;
    cursor: pointer;
    font-family: Impact, sans-serif;
    font-size: 18px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    box-shadow: 4px 4px 0 var(--ink);
    transition: transform .12s, box-shadow .12s, background .15s;
  }
  .btn:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0 var(--ink); background: var(--pink-2); }
  .btn:active { transform: translate(0, 0); box-shadow: 2px 2px 0 var(--ink); }
  .btn-lg { padding: 22px 36px; font-size: 20px; }
  .btn-blue { background: var(--blue); }
  .btn-blue:hover { background: var(--blue-2); }
  .btn-ink { background: var(--ink); border-color: var(--paper); color: var(--paper); box-shadow: 4px 4px 0 var(--pink); }
  .btn-ink:hover { background: var(--pink); border-color: var(--ink); box-shadow: 6px 6px 0 var(--ink); }
  .btn-full { width: 100%; }

  /* ── Hero ─────────────────────────────────────────────────────── */
  .hero {
    position: relative;
    overflow: hidden;
    background:
      radial-gradient(ellipse 100% 55% at 50% 18%, rgba(255,212,0,0.55), transparent 60%),
      radial-gradient(ellipse 90% 60% at 50% 50%, rgba(255,255,255,0.55), transparent 70%),
      linear-gradient(180deg, #d8e8f5 0%, #f4e9d2 60%, #fbf5ea 100%);
    border-bottom: 6px solid var(--ink);
    padding: 80px 32px 0;
  }
  @media (max-width: 760px) { .hero { padding: 40px 20px 0; } }
  .hero::before {
    content: ''; position: absolute; inset: 0;
    background-image:
      radial-gradient(circle at 12% 30%, rgba(255,255,255,0.65) 0%, transparent 18%),
      radial-gradient(circle at 78% 22%, rgba(255,255,255,0.55) 0%, transparent 22%),
      radial-gradient(circle at 92% 65%, rgba(255,255,255,0.5) 0%, transparent 18%),
      radial-gradient(circle at 22% 75%, rgba(255,255,255,0.45) 0%, transparent 16%);
    pointer-events: none;
  }

  .hero-grid {
    max-width: 1280px; margin: 0 auto;
    display: grid; grid-template-columns: 1.05fr 1fr;
    gap: 56px;
    align-items: center;
    position: relative;
    z-index: 1;
  }
  @media (max-width: 980px) { .hero-grid { grid-template-columns: 1fr; gap: 32px; } }

  .hero-mark {
    font-family: Impact, sans-serif;
    text-transform: uppercase;
    font-size: 22px;
    letter-spacing: 0.18em;
    color: var(--ink);
    display: inline-flex; align-items: center; gap: 12px;
    margin-bottom: 22px;
  }
  .hero-mark::before, .hero-mark::after {
    content: ''; width: 32px; height: 3px; background: var(--ink);
  }
  .hero h1 {
    margin: 0;
    font-size: clamp(72px, 11vw, 168px);
    line-height: 0.86;
  }
  .hero h1 .whey {
    color: var(--pink);
    -webkit-text-stroke: 3px var(--ink);
    text-shadow:
      4px 4px 0 var(--ink),
      8px 8px 0 var(--blue);
    transform: rotate(-3deg) skewX(-6deg);
    display: inline-block;
  }
  .hero h1 .maker {
    color: var(--ink);
    -webkit-text-stroke: 1px var(--ink);
    display: block;
    margin-top: 8px;
  }
  .hero-lede {
    margin: 28px 0 22px;
    font-size: 18px;
    line-height: 1.55;
    max-width: 480px;
  }
  .hero-lede b { color: var(--pink); background: var(--paper); padding: 0 4px; }

  .hero-stats {
    display: flex; gap: 14px; margin-bottom: 28px; flex-wrap: wrap;
  }
  .hero-stats .stat {
    background: var(--paper); border: 3px solid var(--ink);
    padding: 12px 18px;
    border-radius: 14px;
    box-shadow: 3px 3px 0 var(--pink);
    font-family: Impact, sans-serif;
    text-transform: uppercase;
    display: flex; flex-direction: column; align-items: flex-start;
    min-width: 96px;
  }
  .hero-stats .stat .n { font-size: 28px; color: var(--ink); line-height: 1; }
  .hero-stats .stat .l { font-size: 11px; letter-spacing: 0.08em; color: var(--ink); margin-top: 4px; opacity: 0.7; }

  .hero-badges {
    display: flex; gap: 10px; flex-wrap: wrap;
    margin-bottom: 32px;
  }
  .pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 14px;
    border-radius: 999px;
    border: 2px solid var(--ink);
    background: var(--paper);
    font-family: Impact, sans-serif;
    font-size: 12px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink);
  }
  .pill.pink  { background: var(--pink); color: #fff; border-color: var(--ink); }
  .pill.blue  { background: var(--blue); color: var(--ink); }
  .pill.yel   { background: var(--yellow); color: var(--ink); }
  .pill.ink   { background: var(--ink); color: var(--paper); border-color: var(--ink); }

  .hero-buy {
    background: var(--paper);
    border: 3px solid var(--ink);
    border-radius: 18px;
    padding: 24px;
    box-shadow: 8px 8px 0 var(--ink);
    max-width: 460px;
    margin-bottom: 56px;
  }
  .hero-buy .price-row {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 16px; padding-bottom: 16px;
    border-bottom: 2px dashed var(--ink);
  }
  .hero-buy .price { font-family: Impact, sans-serif; font-size: 44px; color: var(--ink); line-height: 1; }
  .hero-buy .per { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-2); }
  .hero-buy .per .pink { color: var(--pink); font-weight: 700; }
  .field-label { font-family: Impact, sans-serif; font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink); margin-bottom: 8px; display: flex; justify-content: space-between; }
  .flavor-chips { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
  .flavor-chips button {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 8px 14px;
    border: 2px solid var(--ink); background: var(--paper);
    border-radius: 999px;
    font: inherit; color: var(--ink); cursor: pointer;
    font-family: Impact, sans-serif; font-size: 13px;
    letter-spacing: 0.04em; text-transform: uppercase;
    transition: all .12s;
  }
  .flavor-chips button:hover { background: var(--yellow); }
  .flavor-chips button.on { background: var(--pink); color: #fff; }
  .flavor-chips button .swatch { width: 14px; height: 14px; border-radius: 999px; border: 1px solid rgba(0,0,0,0.3); }

  .qty-atc { display: flex; gap: 10px; align-items: stretch; }
  .qty {
    display: flex; align-items: center;
    border: 2px solid var(--ink);
    border-radius: 999px;
    overflow: hidden;
    background: var(--paper);
  }
  .qty button {
    padding: 12px 14px; background: transparent; border: none; cursor: pointer;
    font: inherit; color: inherit;
  }
  .qty span { padding: 0 12px; font-family: Impact, sans-serif; font-size: 18px; min-width: 24px; text-align: center; }

  .hero-img-wrap {
    position: relative;
    aspect-ratio: 1 / 1;
    max-width: 540px;
    margin: 0 auto;
  }
  .hero-img-wrap img.bag {
    width: 100%; height: 100%; object-fit: contain;
    filter: drop-shadow(0 30px 40px rgba(0,0,0,0.25));
    position: relative; z-index: 2;
  }
  .hero-img-wrap .splat {
    position: absolute; inset: 6% -2% -4% -2%;
    background: var(--pink);
    border-radius: 50% 60% 55% 45% / 60% 55% 45% 60%;
    z-index: 0; opacity: 0.5;
    transform: rotate(-6deg);
  }
  .hero-img-wrap .splat-blue {
    position: absolute; inset: -2% 4% 8% 8%;
    background: var(--blue);
    border-radius: 60% 45% 55% 50% / 45% 60% 55% 50%;
    z-index: 1; opacity: 0.4;
    transform: rotate(8deg);
  }
  .hero-img-wrap .scribble {
    position: absolute; z-index: 3;
    font-family: 'Caveat', cursive; font-weight: 700;
    color: var(--ink);
  }
  .hero-img-wrap .scribble.s1 {
    top: 2%; right: 4%;
    font-size: 26px;
    transform: rotate(8deg);
    background: var(--yellow);
    padding: 8px 14px;
    border: 2px solid var(--ink);
    border-radius: 999px;
    box-shadow: 3px 3px 0 var(--ink);
  }
  .hero-img-wrap .scribble.s2 {
    bottom: 4%; left: -2%;
    font-size: 22px;
    transform: rotate(-6deg);
    background: var(--blue);
    color: var(--ink);
    padding: 6px 14px;
    border: 2px solid var(--ink);
    border-radius: 999px;
    box-shadow: 3px 3px 0 var(--ink);
  }

  /* ── Wave divider ───────────────────────────────────────────── */
  .wave-divider {
    display: block;
    width: 100%;
    height: 60px;
    color: var(--ink);
  }

  /* ── Marquee strip 2 (verse) ─────────────────────────────────── */
  .verse-strip {
    background: var(--pink);
    border-top: 6px solid var(--ink);
    border-bottom: 6px solid var(--ink);
    color: #fff;
    padding: 14px 0;
    overflow: hidden;
  }
  .verse-strip .row {
    display: flex; gap: 56px; white-space: nowrap;
    animation: ticker 38s linear infinite;
    width: max-content;
    font-family: Impact, sans-serif;
    font-size: 28px; letter-spacing: 0.04em; text-transform: uppercase;
  }
  .verse-strip .row .star { color: var(--yellow); margin: 0 12px; font-size: 32px; }

  /* ── Sections ─────────────────────────────────────────────────── */
  section.sec {
    padding: 100px 32px;
    border-bottom: 4px solid var(--ink);
  }
  @media (max-width: 760px) { section.sec { padding: 60px 20px; } }
  section.sec .inner { max-width: 1280px; margin: 0 auto; }
  section.sec h2 {
    font-size: clamp(56px, 8vw, 120px);
    margin: 0 0 24px;
  }
  section.sec p.lede {
    font-size: 17px; line-height: 1.6; max-width: 600px; color: var(--ink-2);
  }
  section.sec .head {
    display: flex; align-items: flex-end; justify-content: space-between;
    gap: 32px; margin-bottom: 56px;
  }
  @media (max-width: 760px) { section.sec .head { flex-direction: column; align-items: flex-start; gap: 14px; margin-bottom: 36px; } }

  .sec-cream { background: var(--paper); }
  .sec-cream-2 { background: var(--paper-2); }
  .sec-ink { background: var(--ink); color: var(--paper); }
  .sec-ink p.lede { color: rgba(255,255,255,0.7); }
  .sec-pink { background: var(--pink); color: #fff; }
  .sec-sky {
    background:
      radial-gradient(ellipse 80% 60% at 50% 30%, rgba(255,212,0,0.4), transparent 60%),
      linear-gradient(180deg, var(--sky-pale) 0%, var(--paper) 100%);
  }

  .hl-yel { background: var(--yellow); padding: 0 8px; box-shadow: -4px 4px 0 var(--ink); }
  .hl-pink { background: var(--pink); color: #fff; padding: 0 8px; box-shadow: -4px 4px 0 var(--ink); }
  .hl-blue { background: var(--blue); padding: 0 8px; box-shadow: -4px 4px 0 var(--ink); }
  .pink { color: var(--pink); }
  .blue { color: var(--blue); }

  /* ── Meal in a shake ─────────────────────────────────────────── */
  .meal {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 56px; align-items: center;
  }
  @media (max-width: 980px) { .meal { grid-template-columns: 1fr; gap: 32px; } }
  .meal .photo {
    border: 4px solid var(--ink);
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 12px 12px 0 var(--pink);
    aspect-ratio: 4 / 5;
    transform: rotate(-1.5deg);
  }
  .meal .photo img { width: 100%; height: 100%; object-fit: cover; }
  .meal .stats {
    display: grid; grid-template-columns: repeat(2, 1fr);
    gap: 14px; margin-top: 28px;
  }
  .meal .stats .stat {
    border: 3px solid var(--ink); border-radius: 16px;
    background: var(--paper); padding: 18px;
  }
  .meal .stats .stat .n { font-family: Impact, sans-serif; font-size: 42px; line-height: 1; }
  .meal .stats .stat .l { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-top: 6px; }
  .meal .stats .stat:nth-child(1) .n { color: var(--pink); }
  .meal .stats .stat:nth-child(2) .n { color: var(--blue-2); }
  .meal .stats .stat:nth-child(3) .n { color: var(--ink); }
  .meal .stats .stat:nth-child(4) .n { color: var(--yellow-2); }

  /* ── Ingredients ─────────────────────────────────────────────── */
  .ing-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px;
  }
  @media (max-width: 980px) { .ing-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 600px) { .ing-grid { grid-template-columns: 1fr; } }
  .ing-card {
    border: 3px solid var(--ink); border-radius: 22px;
    background: var(--paper); overflow: hidden;
    transition: transform .15s, box-shadow .15s;
  }
  .ing-card:hover { transform: translate(-3px, -3px); box-shadow: 6px 6px 0 var(--ink); }
  .ing-card .photo { aspect-ratio: 1/1; background: var(--paper-2); border-bottom: 3px solid var(--ink); }
  .ing-card .photo img { width: 100%; height: 100%; object-fit: cover; }
  .ing-card .body { padding: 18px 20px 22px; }
  .ing-card .row1 { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; }
  .ing-card .name { font-family: Impact, sans-serif; font-size: 24px; line-height: 1.05; margin: 0; text-transform: uppercase; }
  .ing-card .amt {
    font-family: Impact, sans-serif;
    background: var(--pink); color: #fff;
    font-size: 14px; letter-spacing: 0.04em;
    padding: 4px 10px; border-radius: 999px;
    border: 2px solid var(--ink);
    white-space: nowrap;
  }
  .ing-card .why { font-size: 13px; line-height: 1.5; margin: 10px 0 0; color: var(--ink-2); }

  /* ── Comparison ──────────────────────────────────────────────── */
  .compare {
    position: relative;
    display: grid;
    grid-template-columns: 1.4fr 1fr 1fr 1fr 1fr;
    border: 4px solid var(--ink);
    border-radius: 22px;
    overflow: hidden;
    background: var(--paper);
  }
  .compare .us-bg {
    position: absolute; top: 0; bottom: 0;
    left: calc(1.4 / 5.4 * 100%);
    width: calc(1 / 5.4 * 100%);
    background: var(--pink);
    z-index: 0;
  }
  .compare .cell {
    position: relative; z-index: 1;
    padding: 24px 16px;
    font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    text-align: center;
    border-bottom: 2px solid var(--line);
    line-height: 1.35;
  }
  .compare .cell.lbl { justify-content: flex-start; text-align: left; color: var(--ink); font-weight: 600; }
  .compare .cell.head {
    font-family: Impact, sans-serif;
    font-size: 18px;
    text-transform: uppercase;
    padding: 28px 14px;
    background: var(--ink);
    color: var(--paper);
  }
  .compare .cell.head.us {
    background: var(--pink); color: #fff;
    box-shadow: inset 0 0 0 3px var(--ink);
  }
  .compare .cell.us {
    color: #fff; font-weight: 700;
    border-bottom-color: rgba(255,255,255,0.25);
  }
  .compare .cell:nth-last-child(-n+5) { border-bottom: 0; }
  @media (max-width: 720px) {
    .compare { grid-template-columns: 1.2fr 1fr 1fr; }
    .compare .us-bg { left: calc(1.2 / 3.2 * 100%); width: calc(1 / 3.2 * 100%); }
    .compare .cell:nth-child(5n+4),
    .compare .cell:nth-child(5n+5) { display: none; }
    .compare .cell { padding: 18px 12px; font-size: 12px; }
    .compare .cell.head { padding: 22px 12px; font-size: 14px; }
  }

  /* ── Math ─────────────────────────────────────────────────────── */
  .math-grid {
    display: grid;
    grid-template-columns: 1fr auto 1fr auto 1fr auto 1fr;
    gap: 14px; align-items: center;
  }
  @media (max-width: 1080px) {
    .math-grid { grid-template-columns: 1fr; }
    .math-grid .op { font-size: 36px !important; transform: rotate(0deg) !important; }
  }
  .math-grid .card {
    border: 3px solid var(--paper);
    background: var(--ink);
    border-radius: 16px;
    padding: 24px 20px;
  }
  .math-grid .card .lbl { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.55); }
  .math-grid .card .num { font-family: Impact, sans-serif; font-size: 58px; line-height: 1; margin-top: 10px; }
  .math-grid .card .u { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: rgba(255,255,255,0.6); margin-top: 6px; letter-spacing: 0.06em; text-transform: uppercase; }
  .math-grid .op {
    font-family: Impact, sans-serif; font-size: 48px;
    color: var(--yellow); text-align: center; transform: rotate(-4deg);
  }
  .math-foot {
    margin-top: 28px;
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: rgba(255,255,255,0.5); letter-spacing: 0.06em; text-transform: uppercase;
  }

  /* ── Athletes ─────────────────────────────────────────────────── */
  .athletes-grid {

              <button onClick={() => setOpenFaq(openFaq === i ? -1 : i)}>

      {/* REVIEWS */}
      <section className="sec sec-cream-2">
        <div className="inner">
          <div className="head">

          <div className="reviews">
            {REVIEWS.map((r, i) => (
              <div key={i} className="card">
                <div className="head" style={{ marginBottom: 12 }}>
                  <Stars n={r.stars} />

                </div>
                <h3 className="t">{r.t}</h3>
                <p className="b">{r.b}</p>
                <div className="meta">
                  <span className="avatar">{r.n.split(' ').map(p => p[0]).slice(0, 2).join('')}</span>
                  <span style={{ fontFamily: 'Inter, sans-serif', letterSpacing: 0, textTransform: 'none', fontWeight: 600 }}>{r.n}</span>

        <div className="legal">
