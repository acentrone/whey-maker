<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Whey Maker — Nevels Nutrition</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&family=Caveat:wght@500;700&display=swap" rel="stylesheet">

<style>
  :root {
    --paper: #ffffff;
    --paper-2: #f8f8f7;
    --card: #ffffff;
    --ink: #0e0e10;
    --ink-2: #2a2a2a;
    --muted: #6c6c6c;
    --muted-2: #9a9a96;
    --line: #ececec;
    --line-2: #dcdcdc;
    --dark: #0a0a0a;

    --pink: #ff2d7a;
    --pink-2: #c4144d;
    --pink-soft: rgba(255,45,122,0.10);
    --blue: #00b8e6;
    --blue-2: #008cb0;
    --blue-soft: rgba(0,184,230,0.10);

    --success: #1c7a4e;
  }

  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--paper); scroll-behavior: smooth; overflow-x: hidden; }
  body {
    font-family: 'Inter', -apple-system, 'Helvetica Neue', Arial, sans-serif;
    color: var(--ink); -webkit-font-smoothing: antialiased;
    line-height: 1.6;
  }
  img { max-width: 100%; display: block; }
  a { color: inherit; text-decoration: none; }
  a:hover { color: var(--blue-2); }

  .display {
    font-family: Impact, 'Haettenschweiler', 'Arial Narrow Bold', sans-serif;
    font-weight: 400; line-height: 0.94; letter-spacing: -0.005em;
    text-transform: uppercase;
  }
  .mono {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }
  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--muted); display: inline-block;
  }
  .pink { color: var(--pink); }
  .blue { color: var(--blue); }
  .pink-bg { background: var(--pink); color: #fff; }
  .blue-bg { background: var(--blue); color: #fff; }

  .bound { max-width: 1280px; margin: 0 auto; padding-left: 32px; padding-right: 32px; }
  @media (max-width: 760px) { .bound { padding-left: 20px; padding-right: 20px; } }

  /* ── Buttons ──────────────────────────────────────────────────── */
  .btn {
    display: inline-flex; align-items: center; justify-content: center;
    gap: 8px; padding: 18px 28px;
    background: var(--pink); color: #fff;
    border: 1.5px solid var(--pink);
    border-radius: 999px; cursor: pointer;
    font-family: 'Inter', sans-serif;
    font-size: 15px; font-weight: 600;
    transition: all .18s ease;
  }
  .btn:hover { background: var(--pink-2); border-color: var(--pink-2); }
  .btn-lg { padding: 22px 36px; font-size: 16px; }
  .btn-blue { background: var(--blue); border-color: var(--blue); }
  .btn-blue:hover { background: var(--blue-2); border-color: var(--blue-2); }
  .btn-outline { background: transparent; color: var(--ink); border-color: var(--ink); }
  .btn-outline:hover { background: var(--ink); color: #fff; border-color: var(--ink); }
  .btn-light { background: #fff; color: var(--ink); border-color: #fff; }
  .btn-light:hover { background: var(--pink); color: #fff; border-color: var(--pink); }
  .btn-dark { background: var(--ink); border-color: var(--ink); color: #fff; }
  .btn-dark:hover { background: #000; border-color: #000; }
  .btn-full { width: 100%; }

  /* ── Nav ─────────────────────────────────────────────────────── */
  .nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 22px 32px;
    border-bottom: 1px solid var(--line);
    background: var(--paper);
    position: sticky; top: 0; z-index: 50;
  }
  @media (max-width: 760px) { .nav { padding: 16px 20px; } }
  .nav .logo {
    font-family: Impact, sans-serif; font-size: 22px; letter-spacing: 0.02em;
  }
  .nav .logo .pink { color: var(--pink); }
  .nav .links { display: flex; gap: 32px; }
  .nav .links a { font-size: 13px; color: var(--ink-2); font-weight: 500; }
  .nav .right { display: flex; align-items: center; gap: 18px; }
  .cart-pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 14px; border: 1px solid var(--ink);
    border-radius: 999px; font-size: 12px; font-weight: 600;
    cursor: pointer; transition: all .15s;
  }
  .cart-pill:hover { background: var(--pink); border-color: var(--pink); color: #fff; }
  @media (max-width: 900px) { .nav .links { display: none; } }

  .breadcrumb { padding: 18px 32px 6px; max-width: 1280px; margin: 0 auto; }
  @media (max-width: 760px) { .breadcrumb { padding: 14px 20px 4px; } }

  /* ── Hero ─────────────────────────────────────────────────────── */
  .hero {
    display: grid;
    grid-template-columns: 100px 1fr 480px;
    gap: 40px;
    max-width: 1280px; margin: 0 auto;
    padding: 24px 32px 80px;
    align-items: flex-start;
  }

  .hero .thumbs {
    display: flex; flex-direction: column; gap: 10px;
    position: sticky; top: 110px;
  }
  .hero .thumbs .thumb {
    width: 88px; height: 88px;
    border: 1px solid var(--line); border-radius: 8px;
    padding: 6px; background: var(--card);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    overflow: hidden; transition: border-color .15s;
  }
  .hero .thumbs .thumb.active { border-color: var(--pink); border-width: 2px; }
  .hero .thumbs .thumb img { width: 100%; height: 100%; object-fit: cover; }
  .hero .thumbs .thumb.contain img { object-fit: contain; }

  .hero .gallery .main {
    background: var(--paper);
    border-radius: 12px;
    aspect-ratio: 1/1;
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  .hero .gallery .main img.contain { width: 80%; height: 80%; object-fit: contain; }
  .hero .gallery .main img.cover { width: 100%; height: 100%; object-fit: cover; }

  /* Buy box */
  .hero .buy h1 {
    font-size: clamp(66px, 8.6vw, 108px);
    margin: 14px 0 18px;
    color: var(--ink);
  }

  /* Macro stat blocks — three solid colored tiles, reused in the
     hero buy box and the "A meal in a shake" section. */
  .macro-tiles {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
    margin: 0 0 22px;
  }
  .macro-tiles .tile {
    padding: 20px 10px 18px;
    border-radius: 12px;
    text-align: center;
    background: var(--ink);
    color: #fff;
    display: flex; flex-direction: column; justify-content: center;
  }
  .macro-tiles .tile .n {
    font-family: Impact, sans-serif;
    font-size: clamp(42px, 6.4vw, 66px);
    line-height: 0.9;
    color: var(--blue);
    white-space: nowrap;
  }
  .macro-tiles .tile .l {
    font-family: 'Inter', sans-serif; font-size: 13px;
    color: var(--blue);
    margin-top: 8px; font-weight: 600;
  }
  /* Larger variant for the meal section — numbers fill the black box
     and jump off the page. Cap the clamp so "238 g" / "60 g" stay on
     one line inside each tile's column. */
  .macro-tiles.macro-tiles-lg .tile { padding: 36px 12px; }
  .macro-tiles.macro-tiles-lg .tile .n {
    font-size: clamp(56px, 7.4vw, 96px);
  }
  .macro-tiles.macro-tiles-lg .tile .l { font-size: 15px; margin-top: 12px; }

  .hero .buy .lede {
    font-size: 15px; color: var(--ink-2); line-height: 1.55;
    margin: 0 0 18px; max-width: 460px;
  }
  .hero .buy .lede b { color: var(--ink); font-weight: 700; }

  .stars { display: inline-flex; gap: 2px; color: var(--pink); align-items: center; }
  .review-line { display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--muted); margin-bottom: 22px; }
  .review-line u { color: var(--blue-2); cursor: pointer; }

  .field { margin-bottom: 16px; }
  .field .label { display: flex; justify-content: space-between; margin-bottom: 10px; }
  .field .label .name { color: var(--muted); font-size: 13px; }

  .flavor-row { display: flex; gap: 10px; }
  .flavor-chip {
    flex: 1;
    border: 1px solid var(--line); background: var(--card);
    border-radius: 999px; padding: 10px 14px;
    display: flex; align-items: center; gap: 10px;
    cursor: pointer; font: inherit; color: inherit;
    transition: border-color .12s;
  }
  .flavor-chip:hover { border-color: var(--ink); }
  .flavor-chip.selected { border: 1.5px solid var(--ink); background: var(--ink); }
  .flavor-chip.selected span { color: #fff; }
  .flavor-chip .swatch { width: 22px; height: 22px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.12); flex-shrink: 0; }
  .flavor-chip span { font-size: 13px; font-weight: 500; }

  .price-block {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 16px 18px;
    border: 1px solid var(--line);
    border-radius: 12px; background: var(--card);
    margin-bottom: 14px;
  }
  .price-block .display { font-size: 34px; }
  .price-block .desc { color: var(--muted); font-size: 12px; }

  .qty-atc { display: flex; gap: 10px; margin-bottom: 14px; }
  .qty {
    display: flex; align-items: center;
    border: 1.5px solid var(--ink); border-radius: 999px; overflow: hidden;
  }
  .qty button { padding: 14px 16px; background: transparent; border: none; cursor: pointer; font: inherit; color: inherit; }
  .qty span { padding: 0 12px; font-weight: 600; min-width: 24px; text-align: center; }

  .per-meal {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 0;
    border-top: 1px solid var(--line); border-bottom: 1px solid var(--line);
    margin-bottom: 16px;
  }
  .per-meal .display { font-size: 28px; color: var(--pink); }
  .per-meal .display small { font-size: 13px; color: var(--muted); font-family: inherit; }

  .trust-bullets { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 12px; color: var(--ink-2); }
  .trust-bullets > div { display: flex; align-items: center; gap: 8px; }
  .trust-bullets svg { color: var(--blue); }

  /* ── Mobile hero — after desktop rules so cascade order works ── */
  @media (max-width: 1080px) {
    .hero {
      grid-template-columns: 56px 1fr;
      grid-template-areas:
        "thumbs image"
        "buy    buy"
        "nsf    nsf";
      gap: 10px; padding: 12px 16px 48px;
    }
    .hero .thumbs {
      grid-area: thumbs;
      display: flex; flex-direction: column; gap: 6px;
      position: static; top: auto;
      align-self: stretch; min-height: 0;
    }
    .hero .thumbs .thumb {
      flex: 1 1 0; min-height: 0;
      width: 100%; height: auto;
      padding: 3px;
    }
    .hero .gallery { display: contents; }
    .hero .gallery .main {
      grid-area: image;
      max-width: none; margin: 0; width: 100%;
      aspect-ratio: 1 / 1; touch-action: pan-y; cursor: grab;
    }
    .hero .buy { grid-area: buy; margin-top: 12px; }
  }

  /* ── Black transparency bar (faith + claims marquee) ────────── */
  .strip {
    background: var(--ink); color: var(--paper);
    overflow: hidden; padding: 16px 0;
    border-top: 1px solid var(--ink); border-bottom: 1px solid var(--ink);
  }
  .strip .row {
    display: flex; gap: 56px; white-space: nowrap;
    animation: ticker 36s linear infinite;
    width: max-content;
    font-family: 'Inter', sans-serif;
    font-size: 15px; font-weight: 500;
  }
  .strip .row > span { display: inline-flex; align-items: center; gap: 56px; }
  .strip .row .pink { color: var(--pink); }
  .strip .row .blue { color: var(--blue); }
  .strip .row .dot { color: var(--paper); opacity: 0.4; }
  /* Star icon in the ticker — SVG keeps a consistent size across systems
     (the previous unicode ★ rendered at different sizes via font fallback). */
  .strip .row .star { display: inline-flex; align-items: center; line-height: 1; }
  .strip .row .star svg { display: block; }
  @keyframes ticker {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }

  /* ── Sections ────────────────────────────────────────────────── */
  .section { padding: 120px 0; }
  @media (max-width: 760px) { .section { padding: 72px 0; } }
  .section.alt { background: var(--paper-2); }
  .section.dark { background: var(--ink); color: var(--paper); }
  .section.pink-bg { background: var(--pink); color: #fff; }
  .section.blue-bg { background: var(--blue); color: #fff; }
  .section.dark .eyebrow, .section.pink-bg .eyebrow, .section.blue-bg .eyebrow { color: rgba(255,255,255,0.7); }
  .section .head { margin-bottom: 56px; max-width: 760px; }
  .section .head h2 {
    font-size: clamp(48px, 6vw, 88px); margin: 0 0 16px;
  }
  .section .head p { color: var(--muted); font-size: 16px; max-width: 560px; margin: 0; }
  .section.dark .head p,
  .section.pink-bg .head p,
  .section.blue-bg .head p { color: rgba(255,255,255,0.78); }

  /* ── NSF Section (blue) ─────────────────────────────────────── */
  .nsf-section {
    padding: 96px 0;
    background: var(--ink);
    color: #fff;
    border-top: 1px solid rgba(255,255,255,0.08);
  }
  @media (max-width: 760px) { .nsf-section { padding: 64px 0; } }
  .nsf-section .inner {
    display: grid; grid-template-columns: 1fr 1.4fr; gap: 56px;
    align-items: center;
  }
  @media (max-width: 880px) { .nsf-section .inner { grid-template-columns: 1fr; gap: 32px; } }
  .nsf-section .badge {
    background: #fff;
    border-radius: 18px;
    padding: 32px;
    display: flex; align-items: center; justify-content: center;
  }
  .nsf-section .badge img { width: 100%; max-width: 320px; height: auto; }
  .nsf-section .call {
    font-family: 'Inter', sans-serif; font-size: 13px;
    color: rgba(255,255,255,0.9); font-weight: 500;
    background: rgba(0,0,0,0.18);
    padding: 8px 16px; border-radius: 999px;
    display: inline-block; margin-bottom: 18px;
  }
  .nsf-section h2 {
    font-family: Impact, sans-serif; font-weight: 400;
    font-size: clamp(40px, 5.5vw, 76px);
    line-height: 1.0;
    margin: 0 0 18px; text-transform: uppercase; color: var(--blue);
  }
  .nsf-section p { font-size: 16px; max-width: 560px; color: rgba(255,255,255,0.92); line-height: 1.6; }
  .nsf-section .check-list {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
    margin-top: 22px;
  }
  @media (max-width: 600px) { .nsf-section .check-list { grid-template-columns: 1fr; } }
  .nsf-section .check-list div {
    display: flex; align-items: center; gap: 10px;
    font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 500;
  }
  .nsf-section .check-list .pip {
    width: 22px; height: 22px; border-radius: 999px;
    background: #fff; color: var(--blue);
    display: inline-flex; align-items: center; justify-content: center;
    flex-shrink: 0; font-size: 14px;
  }

  /* ── Meal in a shake — food composition section ─────────────── */
  .meal-section { background: var(--paper); }
  .meal {
    display: grid; grid-template-columns: 1fr 1.2fr; gap: 56px; align-items: center;
  }
  @media (max-width: 980px) { .meal { grid-template-columns: 1fr; gap: 40px; } }
  .meal h2 { font-size: clamp(56px, 7vw, 96px); margin: 0 0 18px; }
  .meal .lede { font-size: 17px; color: var(--ink-2); line-height: 1.65; max-width: 440px; }
  .meal .lede b { color: var(--ink); }
  /* Meal section macros reuse .macro-tiles with .macro-tiles-lg modifier */
  .meal .macro-tiles { margin-top: 32px; margin-bottom: 0; }

  /* Labeled-shake diagram — image sits clean against the section
     with the same rounded corners as the other cards on the page. */
  .shake-diagram {
    background: #f3e6d3;
    border-radius: 20px;
    padding: 28px 30px;
    display: grid; grid-template-columns: auto 1fr; gap: 22px; align-items: center;
  }
  .shake-diagram .glass { display: flex; align-items: center; justify-content: center; }
  .shake-diagram .glass img { height: 480px; width: auto; display: block; }
  .shake-diagram .ing-key { min-width: 0; }
  .shake-diagram .ing-key .vb {
    font-family: Impact, 'Haettenschweiler', 'Arial Narrow Bold', sans-serif;
    font-weight: 400; text-transform: uppercase; line-height: 0.92;
    color: var(--pink); font-size: clamp(26px, 3vw, 42px);
    margin: 0 0 16px;
  }
  .shake-diagram .ing-key ul { list-style: none; margin: 0; padding: 0; }
  .shake-diagram .ing-key li {
    font-family: Impact, 'Haettenschweiler', 'Arial Narrow Bold', sans-serif;
    font-weight: 400; text-transform: uppercase; letter-spacing: 0.01em;
    color: #14110c; font-size: clamp(14px, 1.4vw, 19px);
    line-height: 1.62; white-space: nowrap;
  }
  @media (max-width: 560px) {
    .shake-diagram { grid-template-columns: 1fr; gap: 16px; padding: 22px; }
    .shake-diagram .glass img { height: 340px; margin: 0 auto; }
    .shake-diagram .ing-key li { white-space: normal; }
  }

  /* ── Rolls Royce ingredients section ─────────────────────────── */
  .ings { background: var(--paper-2); }

  /* Compact ingredient tiles */
  .ing-block { margin-top: 32px; }
  .ing-block:first-of-type { margin-top: 0; }
  .ing-block-head {
    display: flex; justify-content: space-between; align-items: baseline;
    gap: 16px;
    padding-bottom: 14px; margin-bottom: 18px;
    border-bottom: 1px solid var(--line);
  }
  .ing-block-head .h {
    font-family: Impact, 'Haettenschweiler', 'Arial Narrow Bold', sans-serif;
    font-weight: 400;
    font-size: clamp(28px, 3.4vw, 44px);
    line-height: 0.94;
    letter-spacing: -0.005em;
    text-transform: uppercase;
    color: var(--ink);
  }
  .ing-block-head .h .pink { color: var(--pink); }
  .ing-block-head .h .blue { color: var(--blue); }
  .ing-block-head .t { font-size: 14px; color: var(--muted); white-space: nowrap; }
  .ing-block-head .t .pink { color: var(--pink); font-weight: 700; }
  .ing-block-head .t .blue { color: var(--blue); font-weight: 700; }
  .ing-tiles {
    display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px;
  }
  @media (max-width: 980px) { .ing-tiles { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 560px) { .ing-tiles { grid-template-columns: repeat(2, 1fr); } }
  .ing-tile {
    background: var(--paper); border: 1px solid var(--line);
    border-radius: 12px; overflow: hidden;
    display: flex; flex-direction: column;
  }
  .ing-tile .ph { position: relative; aspect-ratio: 1; background: #f4ede1; overflow: hidden; }
  .ing-tile .ph img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .ing-tile .ph .tm {
    position: absolute; top: 8px; left: 8px;
    font-family: 'Inter', sans-serif; font-weight: 600; font-size: 10px;
    background: var(--ink); color: #fff;
    padding: 3px 7px; border-radius: 4px;
  }
  .ing-tile .ph .tm.pink { background: var(--pink); }
  .ing-tile .ph .tm.blue { background: var(--blue); }
  .ing-tile .body { padding: 10px 12px 12px; flex: 1; display: flex; flex-direction: column; }
  .ing-tile .n { font-family: 'Inter', sans-serif; font-weight: 600; font-size: 13px; line-height: 1.25; color: var(--ink); }
  .ing-tile .a { font-family: 'Inter', sans-serif; font-weight: 700; font-size: 12px; color: var(--pink); margin-top: 4px; }
  .ing-tile .a.blue { color: var(--blue); }
  .ing-tile .sub { margin-top: 6px; font-size: 11px; color: var(--muted); line-height: 1.4; }

  /* NuFlow one-liner */
  .nuflow-note {
    margin-top: 24px;
    padding: 16px 20px;
    background: var(--paper); border: 1px solid var(--line);
    border-radius: 12px;
    font-size: 14px; line-height: 1.55; color: var(--ink-2);
  }
  .nuflow-note b { color: var(--pink); }

  /* Tighter "No" pills band */
  .no-band {
    display: flex; flex-wrap: wrap; gap: 8px;
    margin-top: 20px;
  }
  .no-band .pill-no {
    background: var(--paper); border: 1px solid var(--line);
    border-radius: 999px;
    padding: 8px 14px;
    font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500;
    color: var(--ink-2);
  }
  .no-band .pill-no .x { color: var(--pink); margin-right: 6px; }

  /* ── Comparison ──────────────────────────────────────────────── */
  .compare {
    position: relative; display: grid;
    grid-template-columns: 1.6fr 1fr 1fr 1fr 1fr;
  }
  .compare .us-bg {
    position: absolute; top: 0; bottom: 0;
    left: calc(1.6 / 5.6 * 100%); width: calc(1 / 5.6 * 100%);
    background: var(--ink); border-radius: 20px;
    z-index: 0; pointer-events: none;
  }
  .compare .cell {
    position: relative; z-index: 1;
    padding: 28px 20px; font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    text-align: center; line-height: 1.4;
    border-bottom: 1px solid var(--line); background: transparent;
    color: var(--ink);
  }
  .compare .cell.lbl { justify-content: flex-start; text-align: left; color: var(--ink); font-weight: 500; }
  .compare .cell.head {
    font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 600;
    padding: 32px 18px;
    color: var(--ink);
  }
  .compare .cell.us { color: #fff; font-weight: 700; border-bottom: 1px solid rgba(255,255,255,0.20); }
  .compare .cell.head.us { border-bottom: 1px solid rgba(255,255,255,0.28); }

          </div>
        </div>
      </section>

      {/* ATHLETES */}
      <section className="section">
        <div className="bound">
          <div className="head" style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end',gap:32,maxWidth:'none'}}>
            <div>
              <h2 className="display">Used by athletes.<br/><span className="blue">Trusted by parents.</span></h2>
            </div>
            <p style={{maxWidth:340}}>Real transformations from athletes that train at Nevels. Real kids, real timeframes, all utilizing Whey Maker as their secret weapon.</p>
          </div>
          <div className="athletes">
            {ATHLETES.map((a, i) => (
              <div key={i} className="card">
                <img src={a.src} alt={a.name} loading="lazy"/>
                <div className="cap"><span className="nm">{a.name}</span><span className="v">{a.cred}</span></div>
              </div>
            ))}
          </div>

          <div className="parent-video stacked">
            <div className="vid">
              <iframe
                src="https://player.vimeo.com/video/1195668848?dnt=1&title=0&byline=0&portrait=0"
                allow="autoplay; fullscreen; picture-in-picture"
                allowFullScreen
                title="Durran — parent testimonial"
              />
            </div>
            <div className="vid">
              <iframe
                src="https://player.vimeo.com/video/1195668846?dnt=1&title=0&byline=0&portrait=0"
                allow="autoplay; fullscreen; picture-in-picture"
                allowFullScreen
                title="Mike — parent testimonial"
              />
            </div>
          </div>
        </div>
      </section>

      {/* FOUNDER */}
      <section className="section alt">
        <div className="bound founder">
          <div className="portrait"><img src={`${ASSETS}/founder-gym.jpg`} alt="Athletes who train at Nevels Fitness" loading="lazy"/></div>
          <div>
            <h2 className="display" style={{fontSize:'clamp(26px, 3.2vw, 44px)'}}>"I developed Whey Maker because every parent of an athlete I train struggles with adding clean muscle on them. There was nothing on the shelf healthy or high-quality enough for my athletes, so I created my dream product."</h2>
            <p style={{color:'var(--muted)',fontSize:16,maxWidth:560}}>Jordan Nevels is owner of Nevels Fitness, the premier sports performance facility in the country helping thousands of athletes get college scholarships and pro contracts. He watched kids trying to gain weight using shakes full of corn maltodextrin, sucralose, soy, and artificial flavors. Parents had no guidance on what they should actually give their children to gain muscle the right way, so he created the way, Whey Maker.</p>
            <div className="founder-quote">"Gain mass lean. Keep it clean. Live for the KING."</div>
            <div className="credits">
              <div><div className="display pink">16 YR</div><div className="eyebrow" style={{marginTop:4}}>Sports nutrition performance</div></div>
              <div><div className="display blue">5000+</div><div className="eyebrow" style={{marginTop:4}}>Athletes trained</div></div>
            </div>
          </div>
        </div>
      </section>

      {/* FAITH MISSION (pink) */}
      <section className="mission">
        <div className="bound">
          <div className="whey-way">
            <h2>The Whey +<br/>The Way</h2>
            <p>That’s why “LIVE FOR THE KING” is printed at the top of every bag.</p>
            <div className="verse">"I am the way, the truth, and the life." — John 14:6</div>
          </div>
        </div>
      </section>

      {/* FAQ */}
      <section className="section faq">
        <div className="bound">
          <h2 className="display">Frequently asked questions.</h2>
          <div className="faq-list">
            {FAQS.map(([q,a], i) => (
              <div key={i} className="faq-item">
                <button onClick={()=>setOpenFaq(openFaq===i?-1:i)}>
                  <span className="q">{q}</span>
                  <span className="pm">{openFaq===i ? <Icon.Minus/> : <Icon.Plus/>}</span>
                </button>
                {openFaq===i && <div className="a">{a}</div>}
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* RESULTS (renamed from Reviews) */}
      <section className="section alt">
        <div className="bound reviews-grid">
          <div className="summary">
            <h2 className="display">Results.</h2>
            <p style={{color:'var(--muted)', fontSize:14, lineHeight:1.6, maxWidth:320}}>What parents and athletes are saying after switching.</p>
            <Stars n={5} size={20}/>
            <div className="review-distribution">
              {[[5,216],[4,24],[3,5],[2,2],[1,1]].map(([s,c]) => (
                <div key={s} className="bar-row">
                  <span style={{width:16}}>{s}★</span>
                  <div className="bar"><div style={{width: (c/248*100)+'%'}}/></div>
                  <span style={{width:30,textAlign:'right',color:'var(--muted)'}}>{c}</span>
                </div>
              ))}
            </div>
            <button className="btn btn-outline btn-full" style={{marginTop:16}}>Share your results</button>
          </div>

          <div className="review-cards">
            {REVIEWS.map((r, i) => (
              <div key={i} className="card">
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <Stars n={r.stars}/>
                  <span className="mono" style={{fontSize:10}}>{r.when}</span>
                </div>
                <div className="display">{r.t}</div>
                <div className="body">{r.b}</div>
                <div className="meta">
                  <span className="who">
                    <span className="avatar">{r.n.split(' ').map(p=>p[0]).slice(0,2).join('')}</span>
                    {r.n}
                  </span>
                  <span>{r.tag}</span>
                </div>
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* FINAL CTA */}
      <section className="cta">
        <div className="verse">— Gain mass lean. Keep it clean. Live for the King.</div>
        <h2 className="display">Gain <span className="pink">muscle</span> now.</h2>
        <p>32 real-food meals per bag. 1250 calories, 60g protein, 238g organic carbs. NSF CERTIFIED FOR SPORT.</p>
        <button className="btn btn-light btn-lg">Add to cart — $120.00</button>
      </section>

      {/* FOOTER */}
      <footer className="footer">
        <div className="cols">
          <div className="brand">
            <img className="logo-img" src={`${ASSETS}/whey-maker-logo.svg`} alt="Whey Maker — Nevels Nutrition"/>
            <p>Real Food. Real Ingredients. Full dosages. Built for athletes who want the best.</p>
            <div className="verse">"I am the way." — John 14:6</div>
          </div>
          <div className="col">
            <h4>Shop</h4>
            <a>Whey Maker</a><a>Whey Maker Light (soon)</a><a>Stacks</a><a>Apparel</a>
          </div>
          <div className="col">
            <h4>Learn</h4>
            <a>How to gain weight</a><a>Ingredient sourcing</a><a>Athletes</a><a>FAQ</a>
          </div>
          <div className="col">
            <h4>Company</h4>
            <a>About Jordan</a><a>Mission</a><a>Contact</a><a>Wholesale</a>
          </div>
        </div>
        <div className="legal">
          <div>© 2026 Nevels Nutrition, LLC</div>
          <div>Shipping · Returns · Privacy · Terms</div>
        </div>
      </footer>

      {/* PRODUCT PHOTO LIGHTBOX — large view + click-to-zoom */}
      {lightbox && (
        <div className="lightbox" onClick={closeLightbox}>
          <button className="lb-close" aria-label="Close" onClick={closeLightbox}>×</button>
          <button className="lb-nav prev" aria-label="Previous" onClick={(e)=>{e.stopPropagation();stepThumb(-1);}}>‹</button>
          <div className="lb-stage" onClick={(e)=>e.stopPropagation()}>
            <img
              src={current.src}
              alt={current.alt}
              draggable={false}
              className={zoom ? 'zoomed' : ''}
              style={zoom ? {transformOrigin: `${origin.x}% ${origin.y}%`} : null}
              onClick={()=>setZoom(z=>!z)}
              onMouseMove={onZoomMove}
            />
          </div>
          <button className="lb-nav next" aria-label="Next" onClick={(e)=>{e.stopPropagation();stepThumb(1);}}>›</button>
          <div className="lb-hint">{zoom ? 'Click image to zoom out · ← → to browse' : 'Click image to zoom · ← → to browse · Esc to close'}</div>
          <div className="lb-thumbs" onClick={(e)=>e.stopPropagation()}>
            {thumbs.map((t, i) => (
              <div key={i} className={`lb-thumb ${thumb===i?'active':''}`} onClick={()=>{setZoom(false);setThumb(i);}}>
                <img src={t.src} alt={t.alt}/>
              </div>
            ))}
          </div>
        </div>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<MinimalPDP/>);
</script>
</body>
</html>
