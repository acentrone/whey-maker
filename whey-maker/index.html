<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Whey Maker — Nevels Nutrition</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800;900&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&family=Caveat:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  html, body { margin: 0; background: #f0eee9; }

  /* The prototype rendered each PDP inside a fixed-size artboard with
     internal scroll. On a real page we want the body to scroll naturally. */
  .pdp-scroll { height: auto; overflow: visible; }

  /* Below-PDP sections: backgrounds remain full-width, inner content is
     centered at a 1450px cap by widening horizontal padding on wide
     viewports. Floor at 40px so narrow viewports keep their original gutter.
     !important beats the inline `padding: 88px 40px` shorthand without
     needing to touch every section. */
  .wm-bound {
    padding-left: max(40px, calc(50vw - 725px)) !important;
    padding-right: max(40px, calc(50vw - 725px)) !important;
  }

  /* Constrain mobile build to a phone width on larger screens
     so the sticky bottom ATC reads correctly. */
  .wm-mobile-wrap {
    width: 100%;
    max-width: 390px;
    margin: 0 auto;
    background: var(--paper);
    position: relative;
    box-shadow: 0 0 60px rgba(0,0,0,0.05);
  }

  /* Empty image-slot styling — looks like a designed placeholder, not a hole */
  image-slot {
    display: block;
    background: repeating-linear-gradient(-45deg, #f2ede0, #f2ede0 8px, #e8e2d3 8px, #e8e2d3 16px);
    outline: 1px solid #d2cdc1;
    outline-offset: -1px;
    color: #4a4a50;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    transition: outline-color .15s, background .15s;
  }
  image-slot[shape="circle"] { outline-offset: -2px; }
  image-slot::part(placeholder) {
    color: #1f1f22;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    text-align: center;
    line-height: 1.4;
    padding: 12px;
  }
  image-slot.is-dark {
    background: repeating-linear-gradient(-45deg, #18181b, #18181b 8px, #222226 8px, #222226 16px);
    outline-color: #2a2a2e;
    color: #8a8a90;
  }
  image-slot.is-dark::part(placeholder) { color: #d4d4d8; }
</style>

<script src="image-slot.js"></script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="imagery.jsx"></script>
<script type="text/babel" src="desktop.jsx"></script>
<script type="text/babel" src="mobile.jsx"></script>

<script type="text/babel">
function useIsMobile(breakpoint = 1024) {
  const [isMobile, setIsMobile] = React.useState(
    typeof window !== 'undefined' ? window.innerWidth < breakpoint : false
  );
  React.useEffect(() => {
    const onResize = () => setIsMobile(window.innerWidth < breakpoint);
    window.addEventListener('resize', onResize);
    return () => window.removeEventListener('resize', onResize);
  }, [breakpoint]);
  return isMobile;
}

function App() {
  const isMobile = useIsMobile();
  if (isMobile) {
    return (
      <div className="wm-mobile-wrap">
        <MobilePDP/>
      </div>
    );
  }
  return <DesktopPDP/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
